name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout lcsd-app
        uses: actions/checkout@v4
        with:
          repository: hkteddychan/lcsd-app
          path: lcsd-app

      - name: Checkout web app
        uses: actions/checkout@v4
        with:
          repository: hkteddychan/Parking-Map
          path: Parking-Map

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install and sync
        run: |
          cd lcsd-app
          npm install --prefer-offline --no-audit --progress=false
          npx cap copy android
          npx cap sync android

      - name: Build APK
        run: |
          cd lcsd-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: parking-map-apk
          path: lcsd-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

      - name: Install GitHub CLI
        if: success()
        run: |
          curl -fsSL https://github.com/cli/cli/releases/download/v2.63.2/gh_2.63.2_linux_amd64.tar.gz -o /tmp/gh.tar.gz
          tar -xzf /tmp/gh.tar.gz -C /tmp
          echo "/tmp/gh_2.63.2_linux_amd64/bin" >> $GITHUB_PATH

      - name: Upload via GitHub CLI
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view v1.0.0 --repo hkteddychan/lcsd-app && \
          gh release upload v1.0.0 lcsd-app/android/app/build/outputs/apk/debug/app-debug.apk --repo hkteddychan/lcsd-app || \
          gh release create v1.0.0 --repo hkteddychan/lcsd-app --title "Parking Map v1.0.0" --notes "Android APK" && \
          gh release upload v1.0.0 lcsd-app/android/app/build/outputs/apk/debug/app-debug.apk --repo hkteddychan/lcsd-app
