name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout lcsd-app
        uses: actions/checkout@v4
        with:
          repository: hkteddychan/lcsd-app
          path: lcsd-app

      - name: Checkout web app
        uses: actions/checkout@v4
        with:
          repository: hkteddychan/LCSD-Sports-Centre
          path: LCSD-Sports-Centre

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install and sync
        run: |
          cd lcsd-app
          npm install --prefer-offline --no-audit --progress=false
          npx cap copy android
          npx cap sync android

      - name: Build APK
        run: |
          cd lcsd-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload to Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: lcsd-app/android/app/build/outputs/apk/debug/app-debug.apk
          name: LCSD Sports Centre v1.0.0
          body: Android APK for LCSD Sports Centre Map with badminton/basketball/volleyball availability
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
