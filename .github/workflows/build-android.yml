name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout lcsd-app
        uses: actions/checkout@v4
        with:
          repository: hkteddychan/lcsd-app
          path: lcsd-app

      - name: Checkout web app (LCSD-Sports-Centre)
        uses: actions/checkout@v4
        with:
          repository: hkteddychan/LCSD-Sports-Centre
          path: LCSD-Sports-Centre

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          cd lcsd-app
          npm install --prefer-offline --no-audit --progress=false
          npx cap sync android

      - name: Build APK
        run: |
          cd lcsd-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LCSD-SportsCentre-APK
          path: lcsd-app/android/app/build/outputs/apk/debug/app-debug.apk
