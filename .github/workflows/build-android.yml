name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout lcsd-app
        uses: actions/checkout@v4
        with:
          repository: hkteddychan/lcsd-app
          path: lcsd-app

      - name: Checkout web app
        uses: actions/checkout@v4
        with:
          repository: hkteddychan/LCSD-Sports-Centre
          path: LCSD-Sports-Centre

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install and sync
        run: |
          cd lcsd-app
          npm install --prefer-offline --no-audit --progress=false
          npx cap copy android
          npx cap sync android

      - name: Build APK
        run: |
          cd lcsd-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload to Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const apkPath = 'lcsd-app/android/app/build/outputs/apk/debug/app-debug.apk';
            const stat = fs.statSync(apkPath);
            console.log('APK size:', stat.size);

            // Delete existing release
            try {
              const releases = await github.rest.repos.listReleases({
                owner: 'hkteddychan',
                repo: 'lcsd-app'
              });
              const existing = releases.data.find(r => r.tag_name === 'v1.0.0');
              if (existing) {
                await github.rest.repos.deleteRelease({
                  owner: 'hkteddychan',
                  repo: 'lcsd-app',
                  release_id: existing.id
                });
                console.log('Deleted old release');
              }
            } catch(e) { console.log('No old release to delete'); }

            // Create release
            const release = await github.rest.repos.createRelease({
              owner: 'hkteddychan',
              repo: 'lcsd-app',
              tag_name: 'v1.0.0',
              name: 'LCSD Sports Centre v1.0.0',
              body: 'Android APK for LCSD Sports Centre Map',
              draft: false
            });
            console.log('Created release:', release.data.id);

            // Upload asset
            const upload = await github.rest.repos.uploadReleaseAsset({
              owner: 'hkteddychan',
              repo: 'lcsd-app',
              release_id: release.data.id,
              name: 'LCSD-SportsCentre.apk',
              data: fs.readFileSync(apkPath),
              headers: {
                'content-type': 'application/vnd.android.package-archive',
                'content-length': stat.size
              }
            });
            console.log('Uploaded:', upload.data.browser_download_url);
