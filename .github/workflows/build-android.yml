name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout lcsd-app
        uses: actions/checkout@v4
        with:
          repository: hkteddychan/lcsd-app
          path: lcsd-app

      - name: Checkout web app
        uses: actions/checkout@v4
        with:
          repository: hkteddychan/LCSD-Sports-Centre
          path: LCSD-Sports-Centre

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install and sync
        run: |
          cd lcsd-app
          npm install --prefer-offline --no-audit --progress=false
          npx cap copy android
          npx cap sync android

      - name: Build APK
        run: |
          cd lcsd-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Create Release & Upload APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH="lcsd-app/android/app/build/outputs/apk/debug/app-debug.apk"
          echo "APK size: $(ls -lh $APK_PATH)"
          
          # Delete existing release if exists
          curl -s -X DELETE \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/hkteddychan/lcsd-app/releases/tags/v1.0.0" || true
          
          # Create new release
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"tag_name":"v1.0.0","name":"LCSD Sports Centre v1.0.0","body":"Android APK - LCSD Sports Centre Map","draft":false}' \
            "https://api.github.com/repos/hkteddychan/lcsd-app/releases")
          echo "Release response: $RESPONSE"
          
          UPLOAD_URL=$(echo $RESPONSE | grep -o '"upload_url":"[^"]*"' | cut -d'"' -f4)
          echo "Upload URL: $UPLOAD_URL"
          
          # Upload asset
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@$APK_PATH" \
            "https://uploads.github.com/repos/hkteddychan/lcsd-app/releases/attachments"
